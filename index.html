<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单分流系统</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #6b6b8a;
    --accent: #4fc3f7;
    --accent2: #7c4dff;
    --new-color: #2196f3;
    --add-color: #ff9800;
    --split-color: #ff5722;
    --cancel-color: #f44336;
    --new-bg: rgba(33,150,243,0.15);
    --add-bg: rgba(255,152,0,0.15);
    --split-bg: rgba(255,87,34,0.15);
    --cancel-bg: rgba(244,67,54,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: white;
  }

  .header-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header-text p { font-size: 12px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }



  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .input-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    min-height: 160px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }

  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger { background: var(--surface2); color: #f44336; border: 1px solid rgba(244,67,54,0.3); }
  .btn-danger:hover { background: rgba(244,67,54,0.1); }



  .btn-sheets { background: #1a7f3c; color: white; }
  .btn-sheets:hover { background: #22a34e; transform: translateY(-1px); }
  .btn-sheets:disabled { background: #1a3a28; color: #4a7a5a; cursor: not-allowed; transform: none; }



  .sheets-config {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }

  .sheets-config.open { display: block; }

  .config-title {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 700;
  }

  .config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .config-field { display: flex; flex-direction: column; gap: 4px; }
  .config-field label { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .config-field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-field input:focus { border-color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .stat { display: flex; align-items: center; gap: 8px; font-size: 13px; font-family: 'JetBrains Mono', monospace; }
  .stat-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; font-weight: 700; color: var(--accent); }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .vehicle-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .vehicle-card:hover { border-color: var(--accent); }
  .vehicle-card.has-content { border-color: rgba(79,195,247,0.3); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .card-title { display: flex; align-items: center; gap: 10px; }

  .vehicle-badge {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; color: white;
  }

  .badge-a { background: #1565c0; }
  .badge-b { background: #6a1b9a; }
  .badge-c { background: #00695c; }
  .badge-d { background: #e65100; }
  .badge-e { background: #c62828; }
  .badge-f { background: #4527a0; }
  .badge-g { background: #2e7d32; }
  .badge-jw { background: #37474f; }

  .card-title-text { font-size: 14px; font-weight: 600; }
  .store-count { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); background: var(--bg); padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); }

  .card-copy-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text-dim); cursor: pointer; font-size: 11px; font-family: 'JetBrains Mono', monospace; transition: all 0.2s; }
  .card-copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .card-body { padding: 14px 16px; max-height: 400px; overflow-y: auto; }
  .card-body::-webkit-scrollbar { width: 4px; }
  .card-body::-webkit-scrollbar-track { background: var(--surface2); }
  .card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state { text-align: center; padding: 30px 0; color: var(--text-dim); font-size: 13px; font-family: 'JetBrains Mono', monospace; }

  .order-block { margin-bottom: 12px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); animation: flowIn 0.3s ease forwards; }
  .order-block:last-child { margin-bottom: 0; }

  .store-name { padding: 8px 12px; background: var(--surface2); font-size: 13px; font-weight: 600; line-height: 1.5; border-bottom: 1px solid var(--border); }
  .store-name.highlight-new { background: var(--new-bg); border-left: 3px solid var(--new-color); color: #90caf9; }
  .store-name.highlight-add { background: var(--add-bg); border-left: 3px solid var(--add-color); color: #ffcc80; }
  .store-name.highlight-split { background: var(--split-bg); border-left: 3px solid var(--split-color); color: #ffab91; }
  .store-name.highlight-cancel { background: var(--cancel-bg); border-left: 3px solid var(--cancel-color); color: #ef9a9a; }

  .order-items { padding: 8px 12px; background: var(--bg); }
  .order-item { font-size: 13px; line-height: 1.8; color: #c8c8d8; }

  .tag { display: inline-block; font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; font-weight: 700; }
  .tag-new { background: var(--new-bg); color: var(--new-color); border: 1px solid rgba(33,150,243,0.3); }
  .tag-add { background: var(--add-bg); color: var(--add-color); border: 1px solid rgba(255,152,0,0.3); }
  .tag-split { background: var(--split-bg); color: var(--split-color); border: 1px solid rgba(255,87,34,0.3); }
  .tag-cancel { background: var(--cancel-bg); color: var(--cancel-color); border: 1px solid rgba(244,67,54,0.3); }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--accent);
    border-radius: 10px; padding: 12px 20px;
    font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--accent);
    z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--cancel-color); color: var(--cancel-color); }

  @keyframes flowIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">KF</div>
    <div class="header-text">
      <h1>订单分流系统</h1>
      <p>KIM FROZEN FOOD — ORDER SORTER v2.1</p>
    </div>

  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>NEW 新顾客</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>加 加货</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff5722"></div>分单</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>取消</div>
  </div>

  <div class="input-section">
    <div class="input-label">贴入原始订单</div>
    <textarea id="inputArea" placeholder="从WhatsApp复制订单文字贴入这里...可以分批贴入，系统会自动累积。"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="processOrders()">▶ 开始分流</button>
      <button class="btn btn-secondary" onclick="clearInput()">清除输入</button>
      <button class="btn btn-danger" onclick="clearAll()">重置全部</button>
      <button class="btn btn-secondary" onclick="toggleConfig()">⚙ Sheet 设置</button>
      <button class="btn btn-sheets" id="sheetsBtn" onclick="exportToSheets()" disabled>↗ 写入 Google Sheets</button>
      <button class="btn btn-secondary" id="openSheetBtn" onclick="openSheet()" style="display:none">📋 打开今日 Sheet</button>
    </div>
  </div>

  <div class="sheets-config" id="sheetsConfig">
    <div class="config-title">// GOOGLE SHEETS 配置</div>
    <div class="config-grid">
      <div class="config-field" style="grid-column: 1/-1">
        <label>今日 SHEET 链接（每天更新，粘贴完整链接自动提取ID）</label>
        <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/..." oninput="extractSheetId()">
      </div>
      <div class="config-field" style="grid-column: 1/-1">
        <label>今日 SHEET ID（自动填入，也可手动填）</label>
        <input type="text" id="sheetId" placeholder="自动从链接提取">
      </div>
      <div class="config-field" style="grid-column: 1/-1">
        <label>APPS SCRIPT URL（一次性设置，不需要每天更新）</label>
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/...">
      </div>
      <div class="config-field" style="grid-column: 1/-1">
        <label>密码（防止他人写入，Apps Script也要设置同样密码）</label>
        <input type="password" id="authPassword" placeholder="设置一个密码">
      </div>
      <div class="config-field"><label>A车 列号</label><input type="text" id="colA" value="B"></div>
      <div class="config-field"><label>B车 列号</label><input type="text" id="colB" value="E"></div>
      <div class="config-field"><label>C车 列号</label><input type="text" id="colC" value="H"></div>
      <div class="config-field"><label>D车 列号</label><input type="text" id="colD" value="K"></div>
      <div class="config-field"><label>E车 列号</label><input type="text" id="colE" value="N"></div>
      <div class="config-field"><label>F车 列号</label><input type="text" id="colF" value="Q"></div>
      <div class="config-field"><label>G车 列号</label><input type="text" id="colG" value="T"></div>
      <div class="config-field"><label>JW/其他 列号</label><input type="text" id="colJW" value="W"></div>
      <div class="config-field"><label>主Sheet名称</label><input type="text" id="sheetName" value="abcde"></div>
      <div class="config-field"><label>起始行</label><input type="number" id="startRow" value="2"></div>
    </div>
    <button class="btn btn-secondary" onclick="saveConfig()">保存设置</button>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat"><span style="color:var(--text-dim);font-size:11px">总订单</span><span class="stat-badge" id="totalCount">0</span></div>
    <div class="stat"><span style="color:var(--new-color);font-size:11px">NEW</span><span class="stat-badge" style="color:var(--new-color)" id="newCount">0</span></div>
    <div class="stat"><span style="color:var(--add-color);font-size:11px">加货</span><span class="stat-badge" style="color:var(--add-color)" id="addCount">0</span></div>
    <div class="stat"><span style="color:var(--split-color);font-size:11px">分单</span><span class="stat-badge" style="color:var(--split-color)" id="splitCount">0</span></div>
    <div class="stat"><span style="color:var(--cancel-color);font-size:11px">取消</span><span class="stat-badge" style="color:var(--cancel-color)" id="cancelCount">0</span></div>
  </div>

  <div class="results-grid" id="resultsGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────
const state = {
  vehicles: { A: [], B: [], C: [], D: [], E: [], F: [], G: [], JW: [] },
  stats: { total: 0, newCount: 0, addCount: 0, splitCount: 0, cancelCount: 0 },
  exported: false
};

let config = {
  sheetId: '',
  clientId: '',
  cols: { A: 'B', B: 'E', C: 'H', D: 'K', E: 'N', F: 'Q', G: 'T', JW: 'W' },
  sheetName: 'abcde',
  startRow: 2
};

try {
  const saved = localStorage.getItem('kf_config_v2');
  if (saved) config = { ...config, ...JSON.parse(saved) };
} catch(e) {}

function loadConfigToUI() {
  document.getElementById('sheetUrl').value = config.sheetUrl || '';
  document.getElementById('sheetId').value = config.sheetId || '';
  document.getElementById('scriptUrl').value = config.scriptUrl || '';
  document.getElementById('authPassword').value = config.authPassword || '';
  document.getElementById('colA').value = config.cols?.A || 'B';
  document.getElementById('colB').value = config.cols?.B || 'E';
  document.getElementById('colC').value = config.cols?.C || 'H';
  document.getElementById('colD').value = config.cols?.D || 'K';
  document.getElementById('colE').value = config.cols?.E || 'N';
  document.getElementById('colF').value = config.cols?.F || 'Q';
  document.getElementById('colG').value = config.cols?.G || 'T';
  document.getElementById('colJW').value = config.cols?.JW || 'W';
  document.getElementById('sheetName').value = config.sheetName || 'abcde';
  document.getElementById('startRow').value = config.startRow || 2;
}
loadConfigToUI();

function saveConfig() {
  config.sheetUrl = document.getElementById('sheetUrl').value.trim();
  config.sheetId = document.getElementById('sheetId').value.trim();
  config.scriptUrl = document.getElementById('scriptUrl').value.trim();
  config.authPassword = document.getElementById('authPassword').value.trim();
  config.cols = {
    A: document.getElementById('colA').value.trim().toUpperCase(),
    B: document.getElementById('colB').value.trim().toUpperCase(),
    C: document.getElementById('colC').value.trim().toUpperCase(),
    D: document.getElementById('colD').value.trim().toUpperCase(),
    E: document.getElementById('colE').value.trim().toUpperCase(),
    F: document.getElementById('colF').value.trim().toUpperCase(),
    G: document.getElementById('colG').value.trim().toUpperCase(),
    JW: document.getElementById('colJW').value.trim().toUpperCase(),
  };
  config.sheetName = document.getElementById('sheetName').value.trim();
  config.startRow = parseInt(document.getElementById('startRow').value) || 2;
  localStorage.setItem('kf_config_v2', JSON.stringify(config));
  showToast('✓ 设置已保存');
}

function toggleConfig() {
  document.getElementById('sheetsConfig').classList.toggle('open');
}

// ── Order Processing ──────────────────────────────────────────
function detectFlag(storeName) {
  if (/new\s*[\u4e00-\u9fff]|new\s+[a-z]/i.test(storeName)) return 'new';
  if (/加$|加货|加单/.test(storeName)) return 'add';
  if (/分单/.test(storeName)) return 'split';
  if (/取消|cancel/i.test(storeName)) return 'cancel';
  return null;
}

function detectVehicle(line) {
  // Match bracket formats: (A), （A）, (A车), （A车）etc.
  const bracketMatch = line.match(/[([（【]\s*([A-Ga-g])\s*(?:车|car)?\s*[)\]）】]/i);
  if (bracketMatch) return bracketMatch[1].toUpperCase();
  // Match "X车" anywhere in line e.g. "Restaurant Chia ping D车"
  const midCarMatch = line.match(/([A-Ga-g])车/i);
  if (midCarMatch) return midCarMatch[1].toUpperCase();
  // Match letter at end of line e.g. "廷香哥罗面 D"
  const endMatch = line.match(/\s([A-Ga-g])\s*$/i);
  if (endMatch) return endMatch[1].toUpperCase();
  if (/JW|自取|自己来|其他/i.test(line)) return 'JW';
  return null;
}

function isNewLine(line) {
  return /^New[\s:：+]/i.test(line.trim());
}

function processOrders() {
  const input = document.getElementById('inputArea').value.trim();
  if (!input) { showToast('请先贴入订单内容', true); return; }

  const lines = input.split('\n');
  let currentStore = null;
  let currentVehicle = null;
  let currentItems = [];

  function saveCurrentStore() {
    if (currentStore && currentVehicle) {
      const block = { storeName: currentStore, items: [...currentItems], flag: detectFlag(currentStore) };
      if (state.vehicles[currentVehicle]) state.vehicles[currentVehicle].push(block);
      else state.vehicles.JW.push(block);
      state.stats.total++;
      if (block.flag === 'new') state.stats.newCount++;
      if (block.flag === 'add') state.stats.addCount++;
      if (block.flag === 'split') state.stats.splitCount++;
      if (block.flag === 'cancel') state.stats.cancelCount++;
    }
  }
  
  function flushPendingNew() {
    // If there is a pending New with no vehicle found, flush to JW
    if (pendingNew) {
      const newName = pendingNew.replace(/^new[\s:：+]*/i, '').trim();
      const storeName = 'New（' + newName + '）（无车次，请确认）';
      const block = { storeName, items: [...currentItems], flag: 'new' };
      state.vehicles.JW.push(block);
      state.stats.total++;
      state.stats.newCount++;
      pendingNew = null;
      currentItems = [];
    }
  }

  let pendingNew = null; // holds "New Lim" waiting for next store
  let pendingRename = null; // holds "改名" line waiting for next store

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const vehicle = detectVehicle(trimmed);
    if (vehicle !== null) {
      saveCurrentStore();
      // Build store name with any pending prefixes
      let storeName = trimmed;
      if (pendingNew) {
        const newName = pendingNew.replace(/^new[\s:：+]*/i, '').trim();
        storeName = 'New（' + newName + '）' + storeName;
        pendingNew = null;
      }
      currentStore = storeName;
      currentVehicle = vehicle;
      // If there was a pending rename line, add as first item note
      currentItems = pendingRename ? ['（' + pendingRename + '）'] : [];
      pendingRename = null;
    } else if (isNewLine(trimmed)) {
      // This line starts with "New", save current store and wait for next store name
      saveCurrentStore();
      currentStore = null;
      currentVehicle = null;
      currentItems = [];
      pendingNew = trimmed;
    } else if (/改名|换名|更名/.test(trimmed)) {
      // This line is a rename notice, save current store and wait for next store name
      saveCurrentStore();
      currentStore = null;
      currentVehicle = null;
      currentItems = [];
      pendingRename = trimmed;
    } else if (currentStore !== null) {
      currentItems.push(trimmed);
    }
  }
  saveCurrentStore();

  document.getElementById('inputArea').value = '';
  renderResults();
  updateStats();
  showToast(`✓ 已分流 ${state.stats.total} 个订单`);
}

function renderResults() {
  const grid = document.getElementById('resultsGrid');
  const vehicles = [
    { key: 'A', label: 'A 车', badgeClass: 'badge-a' },
    { key: 'B', label: 'B 车', badgeClass: 'badge-b' },
    { key: 'C', label: 'C 车', badgeClass: 'badge-c' },
    { key: 'D', label: 'D 车', badgeClass: 'badge-d' },
    { key: 'E', label: 'E 车', badgeClass: 'badge-e' },
    { key: 'F', label: 'F 车', badgeClass: 'badge-f' },
    { key: 'G', label: 'G 车', badgeClass: 'badge-g' },
    { key: 'JW', label: 'JW/BP+自来/其他', badgeClass: 'badge-jw' },
  ];

  grid.innerHTML = vehicles.map(v => {
    const orders = state.vehicles[v.key];
    const hasContent = orders.length > 0;
    return `
      <div class="vehicle-card ${hasContent ? 'has-content' : ''}">
        <div class="card-header">
          <div class="card-title">
            <div class="vehicle-badge ${v.badgeClass}">${v.key}</div>
            <span class="card-title-text">${v.label}</span>
            <span class="store-count">${orders.length} 店</span>
          </div>
          <button class="card-copy-btn" onclick="copyVehicle('${v.key}')">复制</button>
        </div>
        <div class="card-body">
          ${hasContent ? orders.map(renderOrderBlock).join('') : '<div class="empty-state">— 无订单 —</div>'}
        </div>
      </div>`;
  }).join('');

  document.getElementById('sheetsBtn').disabled = state.stats.total === 0;
}

function renderOrderBlock(order) {
  const flagClass = order.flag ? `highlight-${order.flag}` : '';
  const tagMap = { new: '<span class="tag tag-new">NEW</span>', add: '<span class="tag tag-add">加货</span>', split: '<span class="tag tag-split">分单</span>', cancel: '<span class="tag tag-cancel">取消</span>' };
  const tag = order.flag ? tagMap[order.flag] : '';
  return `
    <div class="order-block">
      <div class="store-name ${flagClass}">${escapeHtml(order.storeName)}${tag}</div>
      ${order.items.length > 0 ? `<div class="order-items">${order.items.map(i => `<div class="order-item">${escapeHtml(i)}</div>`).join('')}</div>` : ''}
    </div>`;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  if (state.stats.total > 0) {
    document.getElementById('statsBar').style.display = 'flex';
    document.getElementById('totalCount').textContent = state.stats.total;
    document.getElementById('newCount').textContent = state.stats.newCount;
    document.getElementById('addCount').textContent = state.stats.addCount;
    document.getElementById('splitCount').textContent = state.stats.splitCount;
    document.getElementById('cancelCount').textContent = state.stats.cancelCount;
  }
}

function copyVehicle(vehicleKey) {
  const orders = state.vehicles[vehicleKey];
  if (!orders.length) { showToast('此车次没有订单', true); return; }
  const text = orders.map(o => o.storeName + (o.items.length ? '\n' + o.items.join('\n') : '')).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast(`✓ ${vehicleKey}车 内容已复制`)).catch(() => showToast('复制失败', true));
}

function clearInput() { document.getElementById('inputArea').value = ''; }

function clearAll() {
  if (state.stats.total > 0 && !state.exported) {
    if (!confirm('⚠️ 订单还没有写入 Google Sheets！确定要重置吗？')) return;
  } else if (state.stats.total > 0) {
    if (!confirm('确定要重置全部分流结果吗？')) return;
  }
  state.vehicles = { A: [], B: [], C: [], D: [], E: [], F: [], G: [], JW: [] };
  state.stats = { total: 0, newCount: 0, addCount: 0, splitCount: 0, cancelCount: 0 };
  state.exported = false;
  document.getElementById('inputArea').value = '';
  document.getElementById('statsBar').style.display = 'none';
  renderResults();
  showToast('已重置');
}

// ── Google Sheets Export via Apps Script ─────────────────────
async function exportToSheets() {
  if (!config.scriptUrl) {
    showToast('请先填写 Apps Script URL', true);
    document.getElementById('sheetsConfig').classList.add('open');
    return;
  }
  if (!config.sheetId) {
    showToast('请先填写今日 Sheet ID', true);
    document.getElementById('sheetsConfig').classList.add('open');
    return;
  }

  const btn = document.getElementById('sheetsBtn');
  btn.disabled = true;
  btn.textContent = '写入中...';

  try {
    const payload = {
      sheetId: config.sheetId,
      orders: state.vehicles
    };

    const res = await fetch(config.scriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    // no-cors mode returns opaque response, assume success if no error thrown
    showToast('✓ 已成功写入 Google Sheets！');
  } catch(e) {
    showToast('写入失败：' + e.message, true);
  }

  btn.disabled = false;
  btn.textContent = '↗ 写入 Google Sheets';
}

function extractSheetId() {
  const url = document.getElementById('sheetUrl').value.trim();
  const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (match) {
    document.getElementById('sheetId').value = match[1];
    // Show open sheet button
    document.getElementById('openSheetBtn').style.display = 'flex';
  }
}

function openSheet() {
  const url = config.sheetUrl || (config.sheetId ? `https://docs.google.com/spreadsheets/d/${config.sheetId}` : '');
  if (url) window.open(url, '_blank');
  else showToast('请先填写 Sheet 链接', true);
}

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// Init
window.onload = () => {
  renderResults();
  if (config.sheetUrl) {
    document.getElementById('openSheetBtn').style.display = 'flex';
  }
};
</script>
</body>
</html>
