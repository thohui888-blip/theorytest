<!DOCTYPE html>
<!-- 
  Piano Theory App
  ================
  v1.0 — Initial release. Flashcard + quiz, Grade 1-4, Duolingo-style UI.
  v1.1 — Real symbol images (base64). Audio feedback. Vibrant colours. Grade 5 added.
  v1.2 — Quiz 10 questions. "Name this symbol" question type.
  v1.3 — Restructured: topics by category, no grades. Content corrected against textbook.
  v1.4 — Content fixes: articulation meanings, portato/portamento, sf/sfz, rf/rfz merged,
         poco split, alla breve meaning, Common time bracket removed.
  v1.5 — Quiz: all items tested, wrong answers recycled until correct. Demo sounds.
         Bugfix: da capo symbol removed, duplicate quiz options excluded.
  v2.0 — Major update:
         • App restructured: main topics level (Terms & Signs active; Rhythm,
           Key Signature, Music Instrument coming soon)
         • Multi-user profiles (select your name; records stored separately)
         • Daily Review: 10 questions daily, weak/least-recent terms prioritised
         • Weak Terms book: 2+ wrong answers → enters; 6 consecutive correct → exits
         • Flashcards: swipe left/right to navigate
         • Fixed mirrored back-face text bug
         • Quiz wrong-answer feedback shows the symbol image
         • Card back: name large, meaning smaller (memory hierarchy)
         • Category mastery progress shown on topic list
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Theory</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --green:#58cc02;--green-dark:#46a302;--green-light:#d7ffb8;
  --blue:#1cb0f6;--blue-dark:#0a84c0;
  --red:#ff4b4b;--red-light:#ffdfe0;
  --yellow:#ffc800;--purple:#ce82ff;
  --orange:#ff9500;--pink:#ff6b9d;--teal:#00c9b1;
  --bg:#f0f4ff;--text:#2d2d2d;--text-muted:#777;--border:#e0e0e0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.screen{display:none;width:100%;max-width:480px;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
.grad-bg{background:linear-gradient(160deg,#667eea,#764ba2 50%,#f64f59);color:white;}

/* ── USER SELECT ── */
#userselect{align-items:center;justify-content:center;padding:40px 24px;gap:28px;}
.user-list{display:flex;flex-direction:column;gap:10px;width:100%;}
.user-btn{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);border-bottom:4px solid rgba(0,0,0,.15);border-radius:18px;padding:16px 20px;cursor:pointer;color:white;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;transition:all .2s;display:flex;align-items:center;gap:12px;}
.user-btn:hover{background:rgba(255,255,255,.22);transform:translateY(-2px);}
.user-add-row{display:flex;gap:8px;width:100%;}
.user-input{flex:1;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);border-radius:14px;padding:13px 16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:white;outline:none;}
.user-input::placeholder{color:rgba(255,255,255,.5);}
.user-add-btn{background:var(--yellow);border:none;border-radius:14px;padding:0 20px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:#5b4a00;cursor:pointer;box-shadow:0 4px 0 #d4a700;}
.user-del{margin-left:auto;font-size:13px;opacity:.5;padding:4px 8px;}

/* ── MAIN (big topics) ── */
#main{align-items:center;justify-content:center;padding:40px 24px;gap:28px;}
.logo-icon{width:90px;height:90px;background:linear-gradient(135deg,#ffc800,#ff6b9d);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(255,200,0,.4);animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.logo-title{font-size:30px;font-weight:900;letter-spacing:-1px;text-align:center;}
.logo-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;text-align:center;}
.user-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px;}
.big-topic-list{display:flex;flex-direction:column;gap:12px;width:100%;}
.big-topic-btn{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);border-bottom:4px solid rgba(0,0,0,.15);border-radius:20px;padding:20px;cursor:pointer;display:flex;align-items:center;gap:14px;color:white;transition:all .2s;text-align:left;width:100%;font-family:'Nunito',sans-serif;}
.big-topic-btn:hover:not(.locked){background:rgba(255,255,255,.22);transform:translateY(-2px);}
.big-topic-btn.locked{opacity:.45;cursor:default;}
.big-topic-icon{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.big-topic-name{font-size:18px;font-weight:900;}
.big-topic-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;}

/* ── DAILY REVIEW BANNER ── */
.daily-banner{background:linear-gradient(135deg,#ffc800,#ff9500);border:none;border-radius:20px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;color:#5b4a00;width:100%;font-family:'Nunito',sans-serif;transition:all .2s;box-shadow:0 4px 0 #d4a700;}
.daily-banner:hover{transform:translateY(-2px);}
.daily-banner .db-title{font-size:16px;font-weight:900;}
.daily-banner .db-sub{font-size:12px;font-weight:700;opacity:.75;margin-top:2px;}

/* ── TOPICS (categories) ── */
#topics{background:var(--bg);}
.top-bar{background:white;padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--border);position:sticky;top:0;z-index:10;}
.back-btn{width:36px;height:36px;background:var(--bg);border:2px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;}
.back-btn:hover{background:var(--border);}
.top-bar-title{font-size:18px;font-weight:800;}
.topics-list{padding:20px 16px;display:flex;flex-direction:column;gap:10px;}
.topic-card{background:white;border:2px solid var(--border);border-bottom:4px solid var(--border);border-radius:20px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s;}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.topic-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.topic-info{flex:1;}
.topic-name{font-size:16px;font-weight:800;}
.topic-count{font-size:12px;color:var(--text-muted);margin-top:2px;}
.topic-mastery{font-size:11px;font-weight:700;margin-top:4px;}
.mastery-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:4px;width:100%;}
.mastery-fill{height:100%;border-radius:99px;}
.weak-banner{background:#fff1f2;border:2px solid #fda4af;border-bottom:4px solid #fda4af;border-radius:20px;padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;}
.weak-banner:hover{transform:translateY(-2px);}

/* ── LEARN ── */
#learn{background:var(--bg);}
.learn-header{background:white;padding:16px 20px 20px;border-bottom:3px solid var(--border);}
.learn-nav{display:flex;align-items:center;gap:12px;}
.progress-bar-wrap{flex:1;height:12px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:99px;transition:width .4s ease;}
.progress-label{font-size:12px;font-weight:700;color:var(--text-muted);min-width:32px;text-align:right;}
.learn-content{padding:20px 20px 32px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;overflow-y:auto;}
.card-counter{font-size:13px;font-weight:700;color:var(--text-muted);}
.swipe-hint{font-size:11px;color:var(--text-muted);opacity:.7;}

/* FLASHCARD - display toggle, no 3D */
.flashcard-wrap{width:100%;cursor:pointer;position:relative;touch-action:pan-y;}
.flashcard{width:100%;border-radius:28px;position:relative;transition:transform .25s ease,opacity .25s ease;}
.flashcard.slide-left{transform:translateX(-110%);opacity:0;}
.flashcard.slide-right{transform:translateX(110%);opacity:0;}
.flashcard-face{width:100%;border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center;min-height:240px;}
.flashcard-front{background:white;border:3px solid var(--border);box-shadow:0 6px 0 var(--border);}
.flashcard-back{display:none;color:white;}
.flashcard.flipped .flashcard-front{display:none;}
.flashcard.flipped .flashcard-back{display:flex;}
.card-hint{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;opacity:.65;}
.card-img-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:14px;padding:10px 16px;background:#f8f8f8;border-radius:16px;border:2px solid #eee;max-width:220px;}
.card-img-wrap img{max-width:160px;max-height:90px;object-fit:contain;}
.card-term{font-size:24px;font-weight:900;color:var(--text);line-height:1.2;}
.card-term-name{font-size:26px;font-weight:900;color:white;margin-bottom:10px;}
.card-meaning{font-size:17px;font-weight:700;color:rgba(255,255,255,.92);line-height:1.4;}
.card-lang-table{width:auto;border-collapse:collapse;margin-top:4px;}
.card-lang-table td{padding:4px 8px;font-size:16px;font-weight:800;color:var(--text);}
.card-lang-table td:first-child{text-align:right;opacity:.5;font-size:11px;font-weight:600;padding-right:8px;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;}
.card-lang-table td:last-child{text-align:left;}
.demo-btn{margin-top:12px;background:#f0f4ff;border:2px solid #c7d2fe;border-radius:99px;padding:6px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:#4f46e5;}
.flashcard-nav{display:flex;gap:10px;width:100%;}
.nav-btn{flex:1;padding:14px;border-radius:16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;border:2px solid var(--border);border-bottom:4px solid var(--border);background:white;color:var(--text);transition:all .15s;}
.nav-btn:hover:not(:disabled){transform:translateY(-2px);}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-btn.next-btn{color:white;border-bottom-width:4px;}

/* ── QUIZ ── */
#quiz{background:var(--bg);}
.quiz-header{background:white;padding:16px 20px 20px;border-bottom:3px solid var(--border);}
.quiz-nav{display:flex;align-items:center;gap:12px;}
.quiz-body{padding:24px 20px;flex:1;display:flex;flex-direction:column;}
.quiz-body-inner{flex:1;padding-bottom:160px;}
.question-card{background:white;border:3px solid var(--border);border-radius:24px;padding:24px;text-align:center;margin-bottom:20px;box-shadow:0 4px 0 var(--border);}
.question-type-badge{display:inline-block;color:white;font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.question-text{font-size:18px;font-weight:800;line-height:1.3;}
.question-img{max-width:160px;max-height:90px;object-fit:contain;margin:10px auto;display:block;}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.option-btn{background:white;border:2px solid var(--border);border-bottom:4px solid var(--border);border-radius:16px;padding:14px 10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;text-align:center;line-height:1.3;}
.option-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.option-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
.option-btn.wrong{background:#ffdfe0;border-color:var(--red);color:var(--red);}
.option-btn:disabled{cursor:default;}

/* ── FEEDBACK ── */
.feedback-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:16px 24px 20px;display:none;flex-direction:column;gap:8px;z-index:100;border-top:3px solid transparent;}
.feedback-bar.correct{background:var(--green-light);border-color:var(--green);display:flex;}
.feedback-bar.wrong{background:#ffdfe0;border-color:var(--red);display:flex;}
.feedback-title{font-size:18px;font-weight:800;}
.feedback-bar.correct .feedback-title{color:var(--green-dark);}
.feedback-bar.wrong .feedback-title{color:var(--red);}
.feedback-answer{font-size:13px;color:var(--text-muted);font-weight:600;}
.feedback-img{max-width:120px;max-height:60px;object-fit:contain;margin:4px auto;display:block;background:white;border-radius:10px;padding:6px;}
.feedback-next{color:white;border:none;border-radius:16px;padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all .15s;}
.feedback-bar.correct .feedback-next{background:var(--green);box-shadow:0 4px 0 var(--green-dark);}
.feedback-bar.wrong .feedback-next{background:var(--red);box-shadow:0 4px 0 #c0392b;}

/* ── RESULT ── */
#result{align-items:center;justify-content:center;padding:40px 24px;gap:28px;text-align:center;}
.result-emoji{font-size:80px;animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.result-title{font-size:30px;font-weight:900;}
.result-sub{font-size:14px;color:rgba(255,255,255,.65);margin-top:4px;}
.score-circle{width:150px;height:150px;border-radius:50%;border:6px solid rgba(255,255,255,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.1);}
.score-num{font-size:46px;font-weight:900;color:#ffc800;}
.score-denom{font-size:16px;color:rgba(255,255,255,.5);}
.result-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
.btn-primary{background:var(--green);border:none;box-shadow:0 4px 0 var(--green-dark);border-radius:16px;padding:16px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:white;cursor:pointer;width:100%;transition:all .15s;}
.btn-primary:hover{background:var(--green-dark);transform:translateY(-2px);}
.btn-secondary{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:16px;padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:white;cursor:pointer;width:100%;transition:all .15s;}
.btn-secondary:hover{background:rgba(255,255,255,.25);}

@media(max-width:400px){.options-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- USER SELECT -->
<div id="userselect" class="screen active grad-bg">
  <div>
    <div class="logo-icon">🎹</div>
    <div class="logo-title">Piano Theory</div>
    <div class="logo-sub">Who's practising today?</div>
  </div>
  <div style="width:100%">
    <div class="user-list" id="userList"></div>
    <div class="user-add-row" style="margin-top:14px;">
      <input class="user-input" id="newUserName" placeholder="Add your name..." maxlength="20">
      <button class="user-add-btn" onclick="addUser()">Add</button>
    </div>
  </div>
</div>

<!-- MAIN: big topics -->
<div id="main" class="screen grad-bg">
  <div>
    <div class="logo-icon">🎹</div>
    <div class="logo-title">Piano Theory</div>
    <div style="text-align:center;"><span class="user-chip" onclick="showScreen('userselect')">👤 <span id="currentUserName"></span> · switch</span></div>
  </div>
  <div class="big-topic-list">
    <button class="daily-banner" onclick="startDailyReview()" id="dailyBanner">
      <div style="font-size:28px;">⭐</div>
      <div style="text-align:left;">
        <div class="db-title">Daily Review</div>
        <div class="db-sub" id="dailySub">10 questions · keep your memory fresh</div>
      </div>
    </button>
    <button class="big-topic-btn" onclick="openTermsSigns()">
      <div class="big-topic-icon">🎼</div>
      <div style="flex:1;">
        <div class="big-topic-name">Terms & Signs</div>
        <div class="big-topic-sub" id="tsSub">5 categories</div>
      </div>
      <div style="font-size:20px;opacity:.5;">›</div>
    </button>
    <button class="big-topic-btn locked">
      <div class="big-topic-icon">🥁</div>
      <div style="flex:1;">
        <div class="big-topic-name">Rhythm</div>
        <div class="big-topic-sub">Coming soon</div>
      </div>
      <div style="font-size:18px;">🔒</div>
    </button>
    <button class="big-topic-btn locked">
      <div class="big-topic-icon">🎼</div>
      <div style="flex:1;">
        <div class="big-topic-name">Key Signature</div>
        <div class="big-topic-sub">Coming soon</div>
      </div>
      <div style="font-size:18px;">🔒</div>
    </button>
    <button class="big-topic-btn locked">
      <div class="big-topic-icon">🎻</div>
      <div style="flex:1;">
        <div class="big-topic-name">Music Instrument</div>
        <div class="big-topic-sub">Orchestra Family · Coming soon</div>
      </div>
      <div style="font-size:18px;">🔒</div>
    </button>
  </div>
</div>

<!-- TOPICS: categories inside Terms & Signs -->
<div id="topics" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('main')">←</button>
    <div>
      <div class="top-bar-title">Terms & Signs</div>
      <div style="font-size:12px;color:var(--text-muted);">Choose a category</div>
    </div>
  </div>
  <div class="topics-list" id="topicsList"></div>
</div>

<!-- LEARN -->
<div id="learn" class="screen">
  <div class="learn-header">
    <div class="learn-nav">
      <button class="back-btn" onclick="showScreen('topics')">←</button>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="learnProgress" style="width:0%"></div></div>
      <div class="progress-label" id="learnProgressLabel">1/1</div>
    </div>
  </div>
  <div class="learn-content" id="learnContent"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-nav">
      <button class="back-btn" onclick="quizExit()">✕</button>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="quizProgress" style="width:0%"></div></div>
      <div class="progress-label" id="quizProgressLabel">0/10</div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="quiz-body-inner" id="quizBody"></div>
  </div>
  <div class="feedback-bar" id="feedbackBar">
    <div class="feedback-title" id="feedbackTitle"></div>
    <img class="feedback-img" id="feedbackImg" style="display:none;">
    <div class="feedback-answer" id="feedbackAnswer"></div>
    <button class="feedback-next" id="feedbackNext" onclick="nextQuestion()">Continue</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen grad-bg">
  <div class="result-emoji" id="resultEmoji">🎉</div>
  <div><div class="result-title" id="resultTitle">Great job!</div><div class="result-sub" id="resultSub">Quiz complete</div></div>
  <div class="score-circle"><div class="score-num" id="resultScore">10</div><div class="score-denom" id="resultDenom">/ 10</div></div>
  <div class="result-btns">
    <button class="btn-primary" onclick="retryQuiz()" id="retryBtn">🔄 Try Again</button>
    <button class="btn-secondary" onclick="showScreen('main')">🏠 Home</button>
  </div>
</div>

// ── ARTICULATION / DYNAMICS DEMO SOUNDS ──
function playDemo(termId){
  AC.resume&&AC.resume();
  try{
    const base=440; // A4
    switch(termId){
      case 'staccato':
        // Short detached notes
        [0,.25,.5].forEach(d=>{ playTone(base,d,.06,'sine',.4); });
        break;
      case 'staccatissimo':
        // Very short, sharper
        [0,.18,.36].forEach(d=>{ playTone(base,d,.03,'sine',.45); });
        break;
      case 'legato':{
        // Smooth connected notes, long duration
        const freqs=[440,494,523,587];
        freqs.forEach((f,i)=>playTone(f,i*.28,.35,'sine',.3));
        break;
      }
      case 'slur':{
        // Two notes smoothly connected
        playTone(440,0,.4,'sine',.3);
        playTone(523,.35,.4,'sine',.3);
        break;
      }
      case 'tie':
        // Same note held longer
        playTone(440,0,.8,'sine',.3);
        break;
      case 'crescendo':{
        // One note, volume ramps up
        const o=AC.createOscillator(),g=AC.createGain();
        o.connect(g);g.connect(AC.destination);
        o.type='sine';o.frequency.value=440;
        const t=AC.currentTime;
        g.gain.setValueAtTime(0.02,t);
        g.gain.linearRampToValueAtTime(0.5,t+1.2);
        g.gain.exponentialRampToValueAtTime(0.001,t+1.3);
        o.start(t);o.stop(t+1.4);
        break;
      }
      case 'decrescendo':{
        // One note, volume fades
        const o=AC.createOscillator(),g=AC.createGain();
        o.connect(g);g.connect(AC.destination);
        o.type='sine';o.frequency.value=440;
        const t=AC.currentTime;
        g.gain.setValueAtTime(0.5,t);
        g.gain.linearRampToValueAtTime(0.02,t+1.2);
        g.gain.exponentialRampToValueAtTime(0.001,t+1.3);
        o.start(t);o.stop(t+1.4);
        break;
      }
      case 'accent':
        // Sharp attack then normal
        playTone(440,0,.5,'sine',.7);
        break;
      case 'marcato':
        // Even sharper attack, shorter
        playTone(440,0,.3,'sine',.85);
        break;
      case 'tenuto':
        // Full sustained note with slight pressure (steady volume)
        playTone(440,0,.7,'sine',.4);
        break;
      case 'portato':{
        // Slightly separated - between staccato and legato
        [0,.3,.6].forEach(d=>playTone(440,d,.2,'sine',.35));
        break;
      }
      case 'fp':{
        // Loud then immediately quiet
        const o=AC.createOscillator(),g=AC.createGain();
        o.connect(g);g.connect(AC.destination);
        o.type='sine';o.frequency.value=440;
        const t=AC.currentTime;
        g.gain.setValueAtTime(0.8,t);
        g.gain.linearRampToValueAtTime(0.05,t+0.15);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
        o.start(t);o.stop(t+0.9);
        break;
      }
      case 'sfz':{
        // Sudden forced accent
        const o=AC.createOscillator(),g=AC.createGain();
        o.connect(g);g.connect(AC.destination);
        o.type='sawtooth';o.frequency.value=440;
        const t=AC.currentTime;
        g.gain.setValueAtTime(0.9,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o.start(t);o.stop(t+0.4);
        break;
      }
      case 'rf':{
        // Reinforcing - strong accent
        const o=AC.createOscillator(),g=AC.createGain();
        o.connect(g);g.connect(AC.destination);
        o.type='sine';o.frequency.value=440;
        const t=AC.currentTime;
        g.gain.setValueAtTime(0.75,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o.start(t);o.stop(t+0.5);
        break;
      }
      case 'pp': playTone(440,0,.6,'sine',.05); break;
      case 'p':  playTone(440,0,.6,'sine',.12); break;
      case 'mp': playTone(440,0,.6,'sine',.2); break;
      case 'mf': playTone(440,0,.6,'sine',.3); break;
      case 'f':  playTone(440,0,.6,'sine',.5); break;
      case 'ff': playTone(440,0,.6,'sine',.7); break;
    }
  }catch(e){}
}

// ══════════ FEEDBACK SOUNDS ══════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq,delay,dur,type,vol){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.01);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start(t);o.stop(t+dur+.01);
}
function playSound(type){
  try{
    if(type==='correct'){playTone(523,.0,.08,'sine',.3);playTone(659,.09,.08,'sine',.3);playTone(784,.18,.15,'sine',.3);}
    else if(type==='wrong'){playTone(300,.0,.1,'sawtooth',.2);playTone(220,.12,.2,'sawtooth',.15);}
    else if(type==='complete'){[523,659,784,1047].forEach((f,i)=>playTone(f,i*.12,.15,'sine',.25));}
  }catch(e){}
}

// ══════════ USER PROFILES & STORAGE ══════════
// Storage shape: pianoTheory_users = ["Alice","Ben"]
// pianoTheory_stats_<user> = { "<termKey>": {wrong:0, correctStreak:0, lastSeen:0, mastered:false} }
const LS_USERS='pianoTheory_users';
let currentUser=null;

function termKey(item){ return (item.type==='lang'?item.it:item.term); }

function getUsers(){
  try{ return JSON.parse(localStorage.getItem(LS_USERS))||[]; }catch(e){ return []; }
}
function saveUsers(u){ try{ localStorage.setItem(LS_USERS,JSON.stringify(u)); }catch(e){} }

function getStats(){
  if(!currentUser) return {};
  try{ return JSON.parse(localStorage.getItem('pianoTheory_stats_'+currentUser))||{}; }catch(e){ return {}; }
}
function saveStats(s){
  if(!currentUser) return;
  try{ localStorage.setItem('pianoTheory_stats_'+currentUser,JSON.stringify(s)); }catch(e){}
}

function recordAnswer(item, correct){
  const stats=getStats();
  const k=termKey(item);
  if(!stats[k]) stats[k]={wrong:0,correctStreak:0,lastSeen:0};
  const st=stats[k];
  st.lastSeen=Date.now();
  if(correct){
    st.correctStreak=(st.correctStreak||0)+1;
    // exit weak book after 6 consecutive correct
    if(st.correctStreak>=6) st.wrong=0;
  } else {
    st.wrong=(st.wrong||0)+1;
    st.correctStreak=0;
  }
  saveStats(stats);
}

function isWeak(item){
  const stats=getStats();
  const st=stats[termKey(item)];
  return st && st.wrong>=2;
}

function isMastered(item){
  const stats=getStats();
  const st=stats[termKey(item)];
  return st && (st.correctStreak||0)>=3;
}

  const input=document.getElementById('newUserName');

let currentTopic=null, learnIndex=0, cardFlipped=false;
let touchStartX=0, touchStartY=0;

function selectTopic(t){
  currentTopic=t; learnIndex=0; cardFlipped=false;
  renderCard(); showScreen('learn');
}

function renderCard(){
  const items=currentTopic.items, total=items.length, item=items[learnIndex];
  const isLast=learnIndex===total-1;
  const color=currentTopic.color;
  const pct=(learnIndex/total)*100;
  const prog=document.getElementById('learnProgress');
  prog.style.width=pct+'%'; prog.style.background=color;
  document.getElementById('learnProgressLabel').textContent=`${learnIndex+1}/${total}`;

  let frontHTML='', backHTML='';
  const imgSrc=item.img&&IMGS[item.img]?IMGS[item.img]:'';
  const demoId=DEMO_MAP[item.term]||null;
  const demoBtn=demoId?`<button class="demo-btn" onclick="event.stopPropagation();playDemo('${demoId}')">🔊 Play Sound</button>`:'';

  if(item.type==='imgonly'){
    frontHTML=`
      <div class="card-hint">What is this symbol? Tap to reveal</div>
      ${imgSrc?`<div class="card-img-wrap"><img src="${imgSrc}" alt=""></div>`:''}
      ${demoBtn}`;
    backHTML=`
      <div class="card-hint">Name & Meaning</div>
      <div class="card-term-name">${item.term}</div>
      <div class="card-meaning">${item.meaning}</div>`;
  } else if(item.type==='lang'){
    const rows=[];
    if(item.it) rows.push(`<tr><td>Italian</td><td>${item.it}</td></tr>`);
    if(item.fr) rows.push(`<tr><td>French</td><td>${item.fr}</td></tr>`);
    if(item.de) rows.push(`<tr><td>German</td><td>${item.de}</td></tr>`);
    frontHTML=`
      <div class="card-hint">Tap to reveal meaning</div>
      <table class="card-lang-table">${rows.join('')}</table>`;
    backHTML=`
      <div class="card-hint">Meaning</div>
      <div class="card-term-name" style="font-size:18px;opacity:.85;">${item.it}</div>
      <div class="card-meaning" style="font-size:20px;">${item.meaning}</div>`;
  } else {
    frontHTML=`
      <div class="card-hint">Tap to reveal</div>
      ${imgSrc?`<div class="card-img-wrap"><img src="${imgSrc}" alt=""></div>`:''}
      <div class="card-term">${item.term}</div>
      ${demoBtn}`;
    backHTML=`
      <div class="card-hint">Meaning</div>
      <div class="card-term-name" style="font-size:20px;opacity:.85;">${item.term}</div>
      <div class="card-meaning" style="font-size:20px;">${item.meaning}</div>`;
  }

  document.getElementById('learnContent').innerHTML=`
    <div class="card-counter">${currentTopic.name} · ${learnIndex+1} of ${total}</div>
    <div class="flashcard-wrap" onclick="flipCard()" id="cardWrap">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-face flashcard-front">${frontHTML}</div>
        <div class="flashcard-face flashcard-back" style="background:linear-gradient(135deg,${color},${color}bb)">${backHTML}</div>
      </div>
    </div>
    <div class="swipe-hint">← swipe to navigate →</div>
    <div class="flashcard-nav">
      <button class="nav-btn" onclick="prevCard()" ${learnIndex===0?'disabled':''}>← Back</button>
      ${isLast
        ?`<button class="nav-btn next-btn" onclick="startQuiz()" style="background:${color};border-color:${color};box-shadow:0 4px 0 ${color}88">Start Quiz 🎯</button>`
        :`<button class="nav-btn next-btn" onclick="nextCard()" style="background:${color};border-color:${color};box-shadow:0 4px 0 ${color}88">Next →</button>`
      }
    </div>`;

  // Attach swipe listeners
  const wrap=document.getElementById('cardWrap');
  wrap.addEventListener('touchstart',e=>{
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
  },{passive:true});
  wrap.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0 && learnIndex<total-1) swipeCard('left');
      else if(dx>0 && learnIndex>0) swipeCard('right');
    }
  },{passive:true});
}

function swipeCard(dir){
  const c=document.getElementById('flashcard');
  if(!c) return;
  c.classList.add(dir==='left'?'slide-left':'slide-right');
  setTimeout(()=>{
    if(dir==='left') learnIndex++;
    else learnIndex--;
    cardFlipped=false;
    renderCard();
  },200);
}

function flipCard(){
  cardFlipped=!cardFlipped;
  const c=document.getElementById('flashcard');
  if(c) c.classList.toggle('flipped',cardFlipped);
}
function nextCard(){learnIndex++;cardFlipped=false;renderCard();}
function prevCard(){if(learnIndex>0){learnIndex--;cardFlipped=false;renderCard();}}

// ══════════ QUIZ ══════════
let quizQuestions=[], currentQIndex=0, correctCount=0, totalAnswered=0, answered=false;
let quizMode='topic'; // 'topic' | 'daily' | 'weak'
let quizTotal=0;
let quizPool=[]; // items pool for wrong-option generation

function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}
function termLabel(item){
  if(item.type==='lang') return item.it||(item.fr||item.de);
  return item.term;
}

function allItems(){
  return TOPICS.flatMap(t=>t.items);
}

function getAllWeakItems(){
  return allItems().filter(isWeak);
}

function makeQuestion(item, pool){
  const hasImg=!!(item.img&&IMGS[item.img]);
  const others=pool.filter(x=>x!==item && x.meaning!==item.meaning && termLabel(x)!==termLabel(item));
  const wrongs=[];
  const seenM=new Set([item.meaning]), seenT=new Set([termLabel(item)]);
  for(const o of shuffle(others)){
    if(wrongs.length>=3) break;
    if(seenM.has(o.meaning)||seenT.has(termLabel(o))) continue;
    seenM.add(o.meaning); seenT.add(termLabel(o));
    wrongs.push(o);
  }
  const r=Math.random();
  let qtype;
  if(item.type==='imgonly'){ qtype='img_to_name'; }
  else if(hasImg && r<0.3){ qtype='img_to_name'; }
  else if(r<0.65 || pool.length<4){ qtype='term_to_meaning'; }
  else { qtype='meaning_to_term'; }

  if(qtype==='img_to_name'){
    const opts=shuffle([termLabel(item),...wrongs.map(w=>termLabel(w))]);
    return{q:'What is this symbol called?',img:item.img,answer:termLabel(item),options:opts,type:'Name this symbol',item};
  } else if(qtype==='term_to_meaning'){
    const opts=shuffle([item.meaning,...wrongs.map(w=>w.meaning)]);
    return{q:termLabel(item),img:item.type==='normal'?(item.img||null):null,answer:item.meaning,options:opts,type:'What does this mean?',item};
  } else {
    const opts=shuffle([termLabel(item),...wrongs.map(w=>termLabel(w))]);
    return{q:item.meaning,img:null,answer:termLabel(item),options:opts,type:'Which term means this?',item};
  }
}

function startQuiz(){
  quizMode='topic';
  quizPool=currentTopic.items;
  const items=shuffle(currentTopic.items);
  quizQuestions=items.map(i=>makeQuestion(i,quizPool));
  quizTotal=items.length;
  beginQuiz();
}

function startDailyReview(){
  quizMode='daily';
  const all=allItems();
  const stats=getStats();
  // Priority: weak terms first, then least-recently-seen, then random new
  const scored=all.map(item=>{
    const st=stats[termKey(item)]||{};
    let score=0;
    if((st.wrong||0)>=2) score+=1000+(st.wrong*10); // weak
    if(!st.lastSeen) score+=500; // never seen
    else score+=Math.min(400,(Date.now()-st.lastSeen)/(1000*60*60)); // hours since seen
    return {item,score:score+Math.random()*50};
  });
  scored.sort((a,b)=>b.score-a.score);
  const picked=scored.slice(0,10).map(s=>s.item);
  quizPool=all;
  quizQuestions=shuffle(picked).map(i=>makeQuestion(i,quizPool));
  quizTotal=picked.length;
  beginQuiz();
}

function startWeakQuiz(){
  quizMode='weak';
  const weak=getAllWeakItems();
  if(weak.length===0) return;
  quizPool=allItems();
  quizQuestions=shuffle(weak).map(i=>makeQuestion(i,quizPool));
  quizTotal=weak.length;
  beginQuiz();
}

function beginQuiz(){
  currentQIndex=0;correctCount=0;totalAnswered=0;answered=false;
  showScreen('quiz');renderQuestion();
}

function quizColor(){
  if(quizMode==='topic') return currentTopic.color;
  if(quizMode==='daily') return '#ff9500';
  return '#f43f5e';
}

function quizExit(){
  showScreen(quizMode==='topic'?'topics':'main');
}

function renderQuestion(){
  hideFeedback();answered=false;
  const q=quizQuestions[currentQIndex];
  const color=quizColor();
  const prog=document.getElementById('quizProgress');
  prog.style.width=(correctCount/quizTotal*100)+'%';prog.style.background=color;
  document.getElementById('quizProgressLabel').textContent=`${correctCount}/${quizTotal}`;

  const imgHtml=q.img&&IMGS[q.img]?`<img src="${IMGS[q.img]}" class="question-img" alt="">` :'';
  document.getElementById('quizBody').innerHTML=`
    <div class="question-card">
      <div class="question-type-badge" style="background:${color}">${q.type}</div>
      ${imgHtml}
      <div class="question-text">${q.q}</div>
    </div>
    <div class="options-grid">
      ${q.options.map(opt=>`<button class="option-btn" onclick="selectAnswer(this,'${esc(opt)}','${esc(q.answer)}')">${opt}</button>`).join('')}
    </div>`;
}

function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

function selectAnswer(btn,chosen,correct){
  if(answered)return;
  answered=true;totalAnswered++;AC.resume&&AC.resume();
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const q=quizQuestions[currentQIndex];
  if(chosen===correct){
    btn.classList.add('correct');correctCount++;
    recordAnswer(q.item,true);
    playSound('correct');showFeedback(true,correct,q);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.option-btn').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('correct');});
    recordAnswer(q.item,false);
    playSound('wrong');showFeedback(false,correct,q);
    quizQuestions.push(makeQuestion(q.item,quizPool));
  }
}

function showFeedback(ok,correct,q){
  const bar=document.getElementById('feedbackBar');
  bar.className='feedback-bar '+(ok?'correct':'wrong');
  document.getElementById('feedbackTitle').textContent=ok?'✓ Correct!':'✗ Incorrect';
  document.getElementById('feedbackAnswer').textContent=ok?'Well done!':'Correct answer: '+correct;
  // Show symbol image on wrong answer for memory reinforcement
  const fi=document.getElementById('feedbackImg');
  if(!ok && q.item && q.item.img && IMGS[q.item.img]){
    fi.src=IMGS[q.item.img]; fi.style.display='block';
  } else {
    fi.style.display='none';
  }
  document.getElementById('feedbackNext').textContent=correctCount>=quizTotal?'See Results':'Continue';
}

function hideFeedback(){document.getElementById('feedbackBar').className='feedback-bar';}

function nextQuestion(){
  currentQIndex++;
  if(correctCount>=quizTotal) showResult();
  else renderQuestion();
}

function showResult(){
  hideFeedback();
  playSound('complete');
  const perfect=totalAnswered===quizTotal;
  document.getElementById('resultEmoji').textContent=perfect?'🏆':'🎉';
  document.getElementById('resultTitle').textContent=perfect?'Perfect score!':'All done!';
  const subName=quizMode==='topic'?currentTopic.name:(quizMode==='daily'?'Daily Review':'Weak Terms');
  document.getElementById('resultSub').textContent=subName+(perfect?'':` · ${totalAnswered-quizTotal} retried`);
  document.getElementById('resultScore').textContent=quizTotal;
  document.getElementById('resultDenom').textContent='/ '+quizTotal;
  document.getElementById('retryBtn').style.display=quizMode==='topic'?'block':'none';
  showScreen('result');
}

function retryQuiz(){startQuiz();}

// ══════════ INIT ══════════
renderUsers();
document.getElementById('newUserName').addEventListener('keydown',e=>{
  if(e.key==='Enter') addUser();
});
</script>
